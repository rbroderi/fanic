<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload Fanart</title>
    <link rel="icon" href="/static/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Serif+4:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-row">
        <h1 class="site-title"><a href="/" aria-label="FANIC home"><img class="site-logo" src="/static/logo.png" alt="FANIC Logo" /></a></h1>
        <p class="profile-meta">Fanart Upload</p>
        <div class="header-actions">
          <nav class="site-nav" aria-label="Primary">
            <a href="/?view=fanart">Browse fanart</a>
            <a href="/">Browse comics</a>
          </nav>
          <div class="user-menu">
            <button id="userMenuButton" class="user-menu-button" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="userMenuPanel" title="User menu">
              <i class="fa-solid fa-user" aria-hidden="true"></i>
              <span class="sr-only">User menu</span>
            </button>
            <div id="userMenuPanel" class="user-menu-panel" hidden>
              <p id="userMenuStatus" class="user-menu-status">__USER_MENU_STATUS__</p>
              <a id="userMenuLogin" class="user-menu-link" href="/account/login" __USER_MENU_LOGIN_HIDDEN_ATTR__>Login</a>
              <a id="userMenuProfile" class="user-menu-link" href="/user/profile" __USER_MENU_PROFILE_HIDDEN_ATTR__>Profile</a>
              <form id="userMenuLogoutForm" class="auth-inline" method="post" action="/account/logout" __USER_MENU_LOGOUT_HIDDEN_ATTR__>
                <button id="userMenuLogout" type="submit" class="user-menu-logout">Logout</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </header>
    <main class="layout">
      <section class="card">
        <h2>Upload fanart</h2>
        <p class="profile-meta">Images are converted to AVIF and stored with hashed filenames.</p>
        <p class="profile-status __UPLOAD_STATUS_CLASS__" __UPLOAD_STATUS_HIDDEN_ATTR__>__UPLOAD_STATUS_TEXT__</p>
        <form method="post" action="/fanart/upload" enctype="multipart/form-data" class="profile-preferences">
          <label for="fanartTitle">Title</label>
          <input id="fanartTitle" type="text" name="title" maxlength="220" value="__TITLE__" required />

          <label for="fanartSummary">Summary</label>
          <textarea id="fanartSummary" name="summary" rows="5" maxlength="8000" required>__SUMMARY__</textarea>

          <label for="fanartFandom">Fandom</label>
          <input id="fanartFandom" type="text" name="fandom" maxlength="220" value="__FANDOM__" />

          <label for="fanartRating">Rating</label>
          <select id="fanartRating" name="rating">
            __RATING_OPTIONS_HTML__
          </select>

          <label for="fanartImage">Image</label>
          <input id="fanartImage" type="file" name="fanart_image" accept="image/*" required />

          <label class="toggle-row">
            <input type="checkbox" name="agree_terms" required />
            I agree to the Terms and Conditions.
          </label>
          <button type="submit">Upload fanart</button>
        </form>
      </section>
    </main>
    <script src="/static/user-menu.js"></script>
  </body>
</html>
