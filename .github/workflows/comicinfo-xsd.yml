name: ComicInfo XSD

on:
  push:
    paths:
      - "**/ComicInfo.xml"
      - "**/ComicBookInfo.xml"
      - "scripts/validate_comicinfo_xsd.py"
      - "schema/comicinfo/v2.0/ComicInfo.xsd"
      - ".github/workflows/comicinfo-xsd.yml"
  pull_request:
    paths:
      - "**/ComicInfo.xml"
      - "**/ComicBookInfo.xml"
      - "scripts/validate_comicinfo_xsd.py"
      - "schema/comicinfo/v2.0/ComicInfo.xsd"
      - ".github/workflows/comicinfo-xsd.yml"

jobs:
  comicinfo-xsd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Validate ComicInfo XML files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files | grep -Ei '(^|/)(comicinfo|comicbookinfo)\.xml$' || true)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No ComicInfo XML files found in repository."
            exit 0
          fi

          uvx --with xmlschema python scripts/validate_comicinfo_xsd.py "${files[@]}"
