<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FANIC Login</title>
    __SITE_HEAD_ASSETS__
  </head>
  <body>
    __SITE_HEADER_HTML__

    <main class="layout">
      <section class="card info-card">
        <h2 id="loginHeadline">Sign in</h2>
        <p id="loginLead">Use secure Auth0 email login to sign in or create your account.</p>
      </section>

      <section class="card info-card">
        <div id="loginCredentials" class="auth-form" __LOGIN_CREDENTIALS_HIDDEN_ATTR__>
          <div class="auth-row">
            <a id="loginBtn" class="button-like" href="/account/auth0/login" __LOGIN_BUTTON_HIDDEN_ATTR__>Continue with email</a>
          </div>
          <div class="auth-row">
            <a class="button-like button-muted" href="/account/auth0/signup" __LOGIN_BUTTON_HIDDEN_ATTR__>Create account</a>
          </div>
        </div>
        <div class="auth-inline" __LOGOUT_HIDDEN_ATTR__>
          <a id="logoutBtn" class="button-like button-muted" href="/account/logout">Logout</a>
        </div>
        <p id="loginMessage" class="auth-message __LOGIN_MESSAGE_CLASS__" __LOGIN_MESSAGE_HIDDEN_ATTR__>__LOGIN_MESSAGE__</p>
      </section>
    </main>

    __SITE_COMMON_SCRIPTS__
  </body>
</html>
