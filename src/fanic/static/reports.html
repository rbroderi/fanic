<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reports | FANIC Admin</title>
    <link rel="icon" href="/static/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Serif+4:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-row">
        <h1 class="site-title"><a href="/" aria-label="FANIC home"><img class="site-logo" src="/static/logo.png" alt="FANIC Logo" /></a></h1>
        <p class="profile-meta">Fan Archive Nexus for Illustrated Comics</p>
        <div class="header-actions">
          <nav class="site-nav" aria-label="Primary">
            <a href="/">Browse</a>
            __ADMIN_REPORTS_LINK__
            <a href="/reports" aria-current="page">Reports</a>
          </nav>
          <div class="user-menu">
            <button id="userMenuButton" class="user-menu-button" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="userMenuPanel" title="User menu">
              <i class="fa-solid fa-user" aria-hidden="true"></i>
              <span class="sr-only">User menu</span>
            </button>
            <div id="userMenuPanel" class="user-menu-panel" hidden>
              <p id="userMenuStatus" class="user-menu-status">__USER_MENU_STATUS__</p>
              <a id="userMenuLogin" class="user-menu-link" href="/login" __USER_MENU_LOGIN_HIDDEN_ATTR__>Login</a>
              <a id="userMenuProfile" class="user-menu-link" href="/profile" __USER_MENU_PROFILE_HIDDEN_ATTR__>Profile</a>
              <form id="userMenuLogoutForm" class="auth-inline" method="post" action="/logout" __USER_MENU_LOGOUT_HIDDEN_ATTR__>
                <button id="userMenuLogout" type="submit" class="user-menu-logout">Logout</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Submitted Reports</h2>
        <p class="profile-meta">Showing __REPORT_COUNT__ report(s).</p>
        <p class="status-text __REPORT_STATUS_CLASS__" __REPORT_STATUS_HIDDEN_ATTR__>__REPORT_STATUS_TEXT__</p>

        <form method="get" action="/reports" class="upload-form">
          <label for="workIdFilter">Work ID</label>
          <input id="workIdFilter" name="work_id" type="text" value="__REPORT_WORK_ID__" />

          <label for="issueTypeFilter">Issue type</label>
          <select id="issueTypeFilter" name="issue_type">
            <option value="">All issue types</option>
            __REPORT_ISSUE_OPTIONS_HTML__
          </select>

          <label for="statusFilter">Status</label>
          <select id="statusFilter" name="status">
            <option value="">All statuses</option>
            __REPORT_STATUS_OPTIONS_HTML__
          </select>

          <label for="startDateFilter">Start date</label>
          <input id="startDateFilter" name="start_date" type="date" value="__REPORT_START_DATE__" />

          <label for="endDateFilter">End date</label>
          <input id="endDateFilter" name="end_date" type="date" value="__REPORT_END_DATE__" />

          <button type="submit">Apply filters</button>
        </form>
      </section>

      <section class="comments-list">
        __REPORT_ROWS_HTML__
      </section>
    </main>

    <script src="/static/user-menu.js"></script>
  </body>
</html>
