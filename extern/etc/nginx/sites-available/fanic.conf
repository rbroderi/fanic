server {
    server_name fanic.media;

    if ($host != fanic.media) {
        return 444;
    }

    if ($fanic_blocked_bot) {
        return 403;
    }

    access_log /var/log/nginx/fanic.access.log;
    error_log /var/log/nginx/fanic.error.log warn;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: blob: https:; font-src 'self' data: https://cdnjs.cloudflare.com; connect-src 'self'; manifest-src 'self'; media-src 'self'; frame-src 'none'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content" always;

    limit_conn fanic_conn 40;

    error_page 502 503 504 =200 /upstream-unavailable.html;

    location = /upstream-unavailable.html {
        internal;
        root /var/www/fanic-errors;
        default_type text/html;
        add_header Cache-Control "no-store" always;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* ^/(?:fanic\.db|storage/|.*\.(?:db|sqlite|sqlite3))$ {
        return 404;
    }

    location = /robots.txt {
        default_type text/plain;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location = /__alpha_invite {
        limit_except GET HEAD POST OPTIONS {
            deny all;
        }
        limit_req zone=fanic_auth burst=5 nodelay;
        proxy_pass http://unix:/run/fanic/fanic.sock:;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        include /etc/nginx/proxy_params;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
    }

    location /static/ {
        limit_except GET HEAD {
            deny all;
        }
        alias /mnt/storage/static/;
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /cbz/ {
        limit_except GET HEAD {
            deny all;
        }
        limit_req zone=fanic_media burst=10 nodelay;
        alias /mnt/storage/cbz/;
        try_files $uri =404;
        access_log off;
    }

    location /works/ {
        limit_except GET HEAD {
            deny all;
        }
        limit_req zone=fanic_media burst=10 nodelay;
        alias /mnt/storage/works/;
        try_files $uri =404;
        access_log off;
    }

    location /fanart/ {
        limit_except GET HEAD {
            deny all;
        }
        limit_req zone=fanic_media burst=10 nodelay;
        alias /mnt/storage/fanart/;
        try_files $uri =404;
        access_log off;
    }

    location ^~ /api/ {
        limit_except GET HEAD POST OPTIONS {
            deny all;
        }
        limit_req zone=fanic_api burst=20 nodelay;
        proxy_pass http://unix:/run/fanic/fanic.sock:;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        include /etc/nginx/proxy_params;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
    }

    location / {
        limit_except GET HEAD POST OPTIONS {
            deny all;
        }
        limit_req zone=fanic_general burst=60 nodelay;
        proxy_pass http://unix:/run/fanic/fanic.sock:;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        include /etc/nginx/proxy_params;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/fanic.media/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/fanic.media/privkey.pem; # managed by Certbot
    ssl_trusted_certificate /etc/letsencrypt/live/fanic.media/chain.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = fanic.media) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name fanic.media;
    return 404; # managed by Certbot


}
