<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FANIC Login</title>
    __SITE_HEAD_ASSETS__
  </head>
  <body>
    __SITE_HEADER_HTML__

    <main class="layout">
      <section class="card info-card">
        <h2 id="loginHeadline">Sign in</h2>
        <p id="loginLead">Use secure Auth0 email login to sign in or create your account.</p>
      </section>

      <section class="card info-card">
        <form id="loginForm" class="auth-form" method="post" action="/account/login">
          <div id="loginCredentials" __LOGIN_CREDENTIALS_HIDDEN_ATTR__>
            <div class="auth-row">
              <button id="loginBtn" type="submit" __LOGIN_BUTTON_HIDDEN_ATTR__>Continue with email</button>
            </div>
            <div class="auth-row">
              <a class="button-like button-muted" href="/account/auth0/signup" __LOGIN_BUTTON_HIDDEN_ATTR__>Create account</a>
            </div>
          </div>
        </form>
        <form id="logoutForm" class="auth-inline" method="post" action="/account/logout" __LOGOUT_HIDDEN_ATTR__>
          <button id="logoutBtn" type="submit" class="button-muted">Logout</button>
        </form>
        <p id="loginMessage" class="auth-message __LOGIN_MESSAGE_CLASS__" __LOGIN_MESSAGE_HIDDEN_ATTR__>__LOGIN_MESSAGE__</p>
      </section>
    </main>

    __SITE_COMMON_SCRIPTS__
  </body>
</html>
