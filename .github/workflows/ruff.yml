name: Ruff

on:
  push:
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/ruff.yml"
  pull_request:
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/ruff.yml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: check src tests

      - name: Run ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check src tests
