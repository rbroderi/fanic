<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reports | FANIC Admin</title>
    __SITE_HEAD_ASSETS__
  </head>
  <body>
    __SITE_HEADER_HTML__

    <main class="layout">
      <section class="card">
        <h2>__REPORT_TITLE__</h2>
        <div class="quick-links" role="tablist" aria-label="Report views">
          <a href="__REPORT_TAB_CONTENT_HREF__" __REPORT_TAB_CONTENT_ACTIVE__>Content Reports</a>
          <a href="__REPORT_TAB_FEEDBACK_HREF__" __REPORT_TAB_FEEDBACK_ACTIVE__>Feedback</a>
        </div>
        <p class="profile-meta">Showing __REPORT_COUNT__ report(s).</p>
        <p class="status-text __REPORT_STATUS_CLASS__" __REPORT_STATUS_HIDDEN_ATTR__>__REPORT_STATUS_TEXT__</p>

        <form method="get" action="/admin/reports" class="upload-form">
          <input type="hidden" name="tab" value="__REPORT_TAB__" />

          <label for="workIdFilter" __REPORT_WORK_FILTER_HIDDEN_ATTR__>Work ID</label>
          <input id="workIdFilter" name="work_id" type="text" value="__REPORT_WORK_ID__" __REPORT_WORK_INPUT_HIDDEN_ATTR__ />

          <label for="issueTypeFilter">__REPORT_ISSUE_FILTER_LABEL__</label>
          <select id="issueTypeFilter" name="issue_type">
            <option value="">All</option>
            __REPORT_ISSUE_OPTIONS_HTML__
          </select>

          <label for="statusFilter">Status</label>
          <select id="statusFilter" name="status">
            <option value="">All statuses</option>
            __REPORT_STATUS_OPTIONS_HTML__
          </select>

          <label for="startDateFilter">Start date</label>
          <input id="startDateFilter" name="start_date" type="date" value="__REPORT_START_DATE__" />

          <label for="endDateFilter">End date</label>
          <input id="endDateFilter" name="end_date" type="date" value="__REPORT_END_DATE__" />

          <button type="submit">Apply filters</button>
        </form>
      </section>

      <section class="comments-list">
        __REPORT_ROWS_HTML__
      </section>
    </main>

    __SITE_COMMON_SCRIPTS__
  </body>
</html>
