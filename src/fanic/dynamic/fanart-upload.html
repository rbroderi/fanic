<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload Fanart</title>
    __SITE_HEAD_ASSETS__
  </head>
  <body>
    __SITE_HEADER_HTML__
    <main class="layout">
      <section class="card">
        <h2>Upload fanart</h2>
        <p class="profile-status __UPLOAD_STATUS_CLASS__" __UPLOAD_STATUS_HIDDEN_ATTR__>__UPLOAD_STATUS_TEXT__</p>
        <form method="post" action="/fanart/upload" enctype="multipart/form-data" class="profile-preferences">
          <label for="fanartTitle">Title</label>
          <input id="fanartTitle" type="text" name="title" maxlength="220" value="__TITLE__" required />

          <label for="fanartSummary">Summary</label>
          <textarea id="fanartSummary" name="summary" rows="5" maxlength="8000" required>__SUMMARY__</textarea>

          <label for="fanartFandom">Fandom</label>
          <input id="fanartFandom" type="text" name="fandom" maxlength="220" value="__FANDOM__" />

          <label for="fanartRating">Rating</label>
          <select id="fanartRating" name="rating">
            __RATING_OPTIONS_HTML__
          </select>

          <label for="fanartImage">Image</label>
          <input id="fanartImage" type="file" name="fanart_image" accept="image/*" required />

          <label class="toggle-row">
            <input type="checkbox" name="agree_terms" required />
            I agree to the Terms and Conditions.
          </label>
          <button type="submit">Upload fanart</button>
        </form>
      </section>
    </main>
    __SITE_COMMON_SCRIPTS__
  </body>
</html>
