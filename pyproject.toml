[project]
name = "co3"
version = "0.1.0"
description = "AO3-inspired fan comic archive with CBZ ingest and browser reader"
readme = "README.md"
authors = [
    { name = "rbroderi", email = "richard.broderick@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "authlib>=1.3.0",
    "cylinder>=0.1.0",
    "pillow-avif-plugin>=1.4.6",
    "python-dotenv>=1.0.1",
    "pillow>=11.3.0",
    "rust-just>=1.47.1",
    "waitress>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
