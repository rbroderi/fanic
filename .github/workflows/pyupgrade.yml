name: pyupgrade

on:
  push:
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/pyupgrade.yml"
  pull_request:
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/pyupgrade.yml"

jobs:
  pyupgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run pyupgrade
        run: |
          find src tests -name '*.py' -exec uvx pyupgrade --py314-plus --keep-runtime-typing {} +
          git diff --exit-code
