<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FANIC Login</title>
    <link rel="icon" href="/static/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Serif+4:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-row">
        <h1 class="site-title"><a href="/" aria-label="FANIC home"><img class="site-logo" src="/static/logo.png" alt="FANIC Logo" /></a></h1>
        <p class="profile-meta">Fan Archive Nexus for Illustrated Comics</p>
        <div class="header-actions">
          <nav class="site-nav" aria-label="Primary">
            __ADMIN_REPORTS_LINK__
            <a href="/account/login" aria-current="page">Login</a>
          </nav>
          <div class="user-menu">
            <button id="userMenuButton" class="user-menu-button" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="userMenuPanel" title="User menu">
              <i class="fa-solid fa-user" aria-hidden="true"></i>
              <span class="sr-only">User menu</span>
            </button>
            <div id="userMenuPanel" class="user-menu-panel" hidden>
              <p id="userMenuStatus" class="user-menu-status">__USER_MENU_STATUS__</p>
              <a id="userMenuLogin" class="user-menu-link" href="/account/login" __USER_MENU_LOGIN_HIDDEN_ATTR__>Login</a>
              <a id="userMenuProfile" class="user-menu-link" href="/user/profile" __USER_MENU_PROFILE_HIDDEN_ATTR__>Profile</a>
              <form id="userMenuLogoutForm" class="auth-inline" method="post" action="/account/logout" __USER_MENU_LOGOUT_HIDDEN_ATTR__>
                <button id="userMenuLogout" type="submit" class="user-menu-logout">Logout</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="card info-card">
        <h2 id="loginHeadline">Login</h2>
        <p id="loginLead">Sign in to enable comic uploads and admin actions.</p>
      </section>

      <section class="card info-card">
        <form id="loginForm" class="auth-form" method="post" action="/account/login">
          <div id="loginCredentials" __LOGIN_CREDENTIALS_HIDDEN_ATTR__>
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required />

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>

          <div class="auth-row">
            <button id="loginBtn" type="submit" __LOGIN_BUTTON_HIDDEN_ATTR__>Login</button>
          </div>
        </form>
        <form id="logoutForm" class="auth-inline" method="post" action="/account/logout" __LOGOUT_HIDDEN_ATTR__>
          <button id="logoutBtn" type="submit" class="button-muted">Logout</button>
        </form>
        <p id="loginMessage" class="auth-message __LOGIN_MESSAGE_CLASS__" __LOGIN_MESSAGE_HIDDEN_ATTR__>__LOGIN_MESSAGE__</p>
      </section>
    </main>

    <script src="/static/user-menu.js"></script>
  </body>
</html>
