user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers off;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;

	# Basic request/resource limits.
	client_max_body_size 512m;
	client_body_timeout 120s;
	client_header_timeout 15s;
	keepalive_timeout 30s;
	send_timeout 30s;

	# Request throttling and connection caps for app-facing routes.
	limit_req_zone $binary_remote_addr zone=fanic_general:10m rate=30r/s;
	limit_req_zone $binary_remote_addr zone=fanic_api:10m rate=10r/s;
	limit_req_zone $binary_remote_addr zone=fanic_auth:10m rate=5r/m;
	limit_conn_zone $binary_remote_addr zone=fanic_conn:10m;
	limit_req_status 429;

	##
	# Gzip Settings
	##

	gzip on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}


