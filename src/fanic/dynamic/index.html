<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FANIC Archive</title>
    <link rel="icon" href="/static/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Serif+4:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="home-page __HOME_VIEW_CLASS__">
    <header class="site-header">
      <div class="site-header-row">
        <h1 class="site-title"><a href="/" aria-label="FANIC home"><img class="site-logo" src="/static/logo.png" alt="FANIC Logo" /></a></h1>
        <div class="header-actions">
          <nav class="site-nav" aria-label="Primary">
            __ADMIN_REPORTS_LINK__
          </nav>
          <div class="user-menu">
            <button id="userMenuButton" class="user-menu-button" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="userMenuPanel" title="User menu">
              <i class="fa-solid fa-user" aria-hidden="true"></i>
              <span class="sr-only">User menu</span>
            </button>
            <div id="userMenuPanel" class="user-menu-panel" hidden>
              <p id="userMenuStatus" class="user-menu-status">__USER_MENU_STATUS__</p>
              <a id="userMenuLogin" class="user-menu-link" href="/account/login" __USER_MENU_LOGIN_HIDDEN_ATTR__>Login</a>
              <a id="userMenuProfile" class="user-menu-link" href="/user/profile" __USER_MENU_PROFILE_HIDDEN_ATTR__>Profile</a>
              __USER_MENU_UPLOAD_LINK__
              <form id="userMenuLogoutForm" class="auth-inline" method="post" action="/account/logout" __USER_MENU_LOGOUT_HIDDEN_ATTR__>
                <button id="userMenuLogout" type="submit" class="user-menu-logout">Logout</button>
              </form>
            </div>
          </div>
        </div>
        <section class="home-tabs-shell" aria-label="Browse views tabs">
          <nav class="browse-tabs" aria-label="Browse views">
            <a href="/?view=comics" __COMICS_TAB_CURRENT__>Comics</a>
            <a href="/?view=fanart" __FANART_TAB_CURRENT__>Fanart</a>
          </nav>
        </section>
        <p class="profile-meta" __VIEW_TAGLINE_HIDDEN_ATTR__>+Fanart</p>
      </div>
    </header>
    <main class="layout">
      <section class="card">
        <form id="filters" class="filter-row" method="get" action="__FILTER_ACTION__">
          __VIEW_HIDDEN_INPUT__
          <input name="q" placeholder="Search user, title, or summary" value="__FILTER_Q__" />
          <input name="user" placeholder="Username" value="__FILTER_USER__" />
          <input name="fandom" placeholder="Fandom" value="__FILTER_FANDOM__" />
          <input name="tag" placeholder="Tag include" value="__FILTER_TAG__" />
          <select name="status">
            <option value="" __STATUS_ANY_SELECTED__>Any status</option>
            <option value="complete" __STATUS_COMPLETE_SELECTED__>Complete</option>
            <option value="in_progress" __STATUS_IN_PROGRESS_SELECTED__>In progress</option>
          </select>
          <div class="filter-sort-group">
            <label for="filterSort">Sort by</label>
            <select id="filterSort" name="sort">
              <option value="newest" __SORT_NEWEST_SELECTED__>Newest to oldest</option>
              <option value="oldest" __SORT_OLDEST_SELECTED__>Oldest to newest</option>
              <option value="title_asc" __SORT_TITLE_ASC_SELECTED__>Ascending alphabetical</option>
              <option value="title_desc" __SORT_TITLE_DESC_SELECTED__>Descending alphabetical</option>
            </select>
          </div>
          <button type="submit">Search</button>
        </form>
      </section>
      <section class="work-grid" id="workGrid">__WORK_GRID_HTML__</section>
    </main>
    <script src="/static/user-menu.js"></script>
  </body>
</html>
