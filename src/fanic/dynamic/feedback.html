<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Site Feedback | FANIC</title>
    <meta name="description" content="Submit bug reports and site improvement feedback for FANIC." />
    <link rel="icon" href="/static/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Serif+4:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-row">
        <h1 class="site-title"><a href="/" aria-label="FANIC home"><img class="site-logo" src="/static/logo.png" alt="FANIC Logo" /></a></h1>
        <p class="profile-meta">Fan Archive Nexus for Illustrated Comics</p>
        <div class="header-actions">
          <nav class="site-nav" aria-label="Primary">
            __ADMIN_REPORTS_LINK__
            <a href="/feedback" aria-current="page">Feedback</a>
          </nav>
          <div class="user-menu">
            <button id="userMenuButton" class="user-menu-button" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="userMenuPanel" title="User menu">
              <i class="fa-solid fa-user" aria-hidden="true"></i>
              <span class="sr-only">User menu</span>
            </button>
            <div id="userMenuPanel" class="user-menu-panel" hidden>
              <p id="userMenuStatus" class="user-menu-status">__USER_MENU_STATUS__</p>
              <a id="userMenuLogin" class="user-menu-link" href="/account/login" __USER_MENU_LOGIN_HIDDEN_ATTR__>Login</a>
              <a id="userMenuProfile" class="user-menu-link" href="/user/profile" __USER_MENU_PROFILE_HIDDEN_ATTR__>Profile</a>
              <form id="userMenuLogoutForm" class="auth-inline" method="post" action="/account/logout" __USER_MENU_LOGOUT_HIDDEN_ATTR__>
                <button id="userMenuLogout" type="submit" class="user-menu-logout">Logout</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Site Feedback</h2>
        <p class="profile-meta">Report bugs, suggest improvements, and help us make the site better.</p>
        <p class="status-text __FEEDBACK_STATUS_CLASS__" __FEEDBACK_STATUS_HIDDEN_ATTR__>__FEEDBACK_STATUS_TEXT__</p>

        <form method="post" action="/feedback" class="upload-form">
          <label for="reporterName">Your full name</label>
          <input id="reporterName" name="reporter_name" type="text" required />

          <label for="reporterEmail">Your email</label>
          <input id="reporterEmail" name="reporter_email" type="email" required />

          <label for="feedbackCategory">Feedback category</label>
          <select id="feedbackCategory" name="category" required>
            __FEEDBACK_CATEGORY_OPTIONS_HTML__
          </select>

          <label for="pageUrl">Related page URL (optional)</label>
          <input id="pageUrl" name="page_url" type="url" value="__FEEDBACK_PAGE_URL__" placeholder="https://..." />

          <label for="summary">Short summary</label>
          <input id="summary" name="summary" type="text" required />

          <label for="details">Details</label>
          <textarea id="details" name="details" rows="7" required></textarea>

          <label for="screenshotUrl">Screenshot or reference URL (optional)</label>
          <input id="screenshotUrl" name="screenshot_url" type="url" placeholder="https://..." />

          <button type="submit">Submit feedback</button>
        </form>
      </section>
    </main>

    <script src="/static/user-menu.js"></script>
  </body>
</html>
