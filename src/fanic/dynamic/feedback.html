<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Site Feedback | FANIC</title>
    <meta name="description" content="Submit bug reports and site improvement feedback for FANIC." />
    __SITE_HEAD_ASSETS__
  </head>
  <body>
    __SITE_HEADER_HTML__

    <main class="layout">
      <section class="card">
        <h2>Site Feedback</h2>
        <p class="profile-meta">Report bugs, suggest improvements, and help us make the site better.</p>
        <p class="status-text __FEEDBACK_STATUS_CLASS__" __FEEDBACK_STATUS_HIDDEN_ATTR__>__FEEDBACK_STATUS_TEXT__</p>

        <form method="post" action="/feedback" class="upload-form">
          <label for="reporterName">Your full name</label>
          <input id="reporterName" name="reporter_name" type="text" required />

          <label for="reporterEmail">Your email</label>
          <input id="reporterEmail" name="reporter_email" type="email" required />

          <label for="feedbackCategory">Feedback category</label>
          <select id="feedbackCategory" name="category" required>
            __FEEDBACK_CATEGORY_OPTIONS_HTML__
          </select>

          <label for="pageUrl">Related page URL (optional)</label>
          <input id="pageUrl" name="page_url" type="url" value="__FEEDBACK_PAGE_URL__" placeholder="https://..." />

          <label for="summary">Short summary</label>
          <input id="summary" name="summary" type="text" required />

          <label for="details">Details</label>
          <textarea id="details" name="details" rows="7" required></textarea>

          <label for="screenshotUrl">Screenshot or reference URL (optional)</label>
          <input id="screenshotUrl" name="screenshot_url" type="url" placeholder="https://..." />

          <button type="submit">Submit feedback</button>
        </form>
      </section>
    </main>

    __SITE_COMMON_SCRIPTS__
  </body>
</html>
